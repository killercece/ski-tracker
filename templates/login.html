<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Ski Tracker</title>

    <!-- Flash-prevention du theme sombre -->
    <script>
        if (localStorage.getItem('theme') === 'dark' ||
            (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>

    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Favicon -->
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">

    <style>
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .auth-card {
            animation: fade-in 0.3s ease-out;
        }
    </style>
</head>
<body class="h-full bg-zinc-50 dark:bg-zinc-950 font-sans text-zinc-900 dark:text-zinc-50 antialiased">

    <div class="min-h-full flex items-center justify-center px-4 py-12">
        <div class="auth-card w-full max-w-sm">

            <!-- Logo -->
            <div class="flex flex-col items-center mb-8">
                <svg class="w-12 h-12 text-primary-600" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 26 L16 6 L28 26 Z"/>
                    <path d="M10 26 L16 16 L22 26"/>
                    <circle cx="22" cy="8" r="2" fill="currentColor" stroke="none"/>
                    <path d="M22 10 L22 18 M19 13 L25 13 M22 18 L18 24 M22 18 L26 24"/>
                </svg>
                <h1 class="mt-3 text-xl font-bold tracking-tight">Ski Tracker</h1>
            </div>

            <!-- Carte -->
            <div class="rounded-xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 p-6">
                <h2 class="text-lg font-semibold text-center mb-6">Se connecter</h2>

                <!-- Message d'erreur -->
                <div id="login-error" class="hidden mb-4 p-3 rounded-lg bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-sm text-red-700 dark:text-red-400"></div>

                <form id="login-form" class="space-y-4">
                    <div>
                        <label for="username" class="block text-sm font-medium mb-1.5">Nom d'utilisateur</label>
                        <input type="text" id="username" name="username" required autocomplete="username" class="w-full px-3 py-2 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-800 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-shadow">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium mb-1.5">Mot de passe</label>
                        <input type="password" id="password" name="password" required autocomplete="current-password" class="w-full px-3 py-2 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-800 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-shadow">
                    </div>
                    <button type="submit" id="login-btn" class="w-full px-4 py-2.5 rounded-lg bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        Se connecter
                    </button>
                </form>
            </div>

            <!-- Lien inscription -->
            <p class="mt-4 text-center text-sm text-zinc-500 dark:text-zinc-400">
                Pas encore de compte ?
                <a href="/register" class="text-primary-600 hover:text-primary-700 dark:text-primary-400 dark:hover:text-primary-300 font-medium">S'inscrire</a>
            </p>

        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            var errorEl = document.getElementById('login-error');
            var btn = document.getElementById('login-btn');
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value;

            errorEl.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'Connexion...';

            try {
                var res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                });

                var data = await res.json().catch(function() { return {}; });

                if (res.ok) {
                    window.location.href = '/';
                } else {
                    errorEl.textContent = data.error || 'Identifiants incorrects';
                    errorEl.classList.remove('hidden');
                }
            } catch (err) {
                errorEl.textContent = 'Erreur de connexion au serveur';
                errorEl.classList.remove('hidden');
            }

            btn.disabled = false;
            btn.textContent = 'Se connecter';
        });
    </script>

</body>
</html>
